<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B/R LIVE | NFL Draft Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap');

        :root {
            --br-black: #0a0a0a;
            --br-grey: #1a1a1a;
            --br-light-grey: #333333;
            --br-white: #ffffff;
            --br-rainbow: linear-gradient(90deg, #FFB7B2, #FFDAC1, #E2F0CB, #B5EAD7, #C7CEEA, #FFB7B2, #FFDAC1);
        }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background-color: var(--br-black);
            color: var(--br-white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-transform: uppercase;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: var(--br-grey);
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            overflow: hidden;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: var(--br-rainbow);
            background-size: 300% 300%;
            animation: shimmer 4s linear infinite;
            z-index: 10;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .header {
            background-color: var(--br-black);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--br-light-grey);
            flex-shrink: 0;
        }

        .br-logo {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 20px;
            background: var(--br-rainbow);
            background-size: 300% auto;
            animation: shimmer 4s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .api-status {
            font-size: 9px;
            color: #444;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .status-text { display: flex; align-items: center; gap: 5px; }
        .api-status.active .status-text { color: #B5EAD7; }
        .api-status.error .status-text { color: #FFB7B2; }
        .last-check { font-size: 8px; color: #666; text-transform: none; }

        .main-pick {
            padding: 30px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #222 0%, #0a0a0a 100%);
            flex-shrink: 0;
        }

        .label {
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            letter-spacing: 3px;
            color: #666;
            margin-bottom: 5px;
        }

        .pick-number {
            font-family: 'Oswald', sans-serif;
            font-size: 100px;
            line-height: 1;
            font-weight: 700;
            margin: 0;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            background-color: var(--br-black);
            padding: 15px 0;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }

        .stat-item { text-align: center; border-right: 1px solid #222; }
        .stat-item:last-child { border-right: none; }

        .stat-value {
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            background: var(--br-rainbow);
            background-size: 300% auto;
            animation: shimmer 3s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label { font-size: 9px; color: #666; letter-spacing: 1px; margin-top: 2px; }

        .latest-selection {
            background-color: #000;
            margin: 15px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            flex-shrink: 0;
            min-height: 60px;
        }

        .latest-selection::after {
            content: "LATEST SELECTION";
            position: absolute;
            top: -8px;
            left: 15px;
            background: var(--br-rainbow);
            background-size: 300% auto;
            animation: shimmer 3s linear infinite;
            color: #000;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .team-logo-main {
            width: 55px; height: 55px;
            background: #111; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            padding: 5px;
            border: 1px solid #222;
        }
        .team-logo-main img { width: 100%; height: auto; }

        .player-info { text-align: left; overflow: hidden; }
        .player-name { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; color: #fff; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-detail { font-size: 12px; color: #888; margin: 0; }

        .board-header {
            padding: 10px 15px;
            background: #111;
            font-size: 10px;
            letter-spacing: 1px;
            color: #555;
            font-weight: 700;
            border-bottom: 1px solid #222;
        }

        .history-container {
            flex-grow: 1;
            overflow-y: auto;
            background: #050505;
        }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th {
            position: sticky; top: 0; background: #111;
            padding: 8px 15px; text-align: left; color: #444;
            font-size: 9px; z-index: 5;
        }
        td { padding: 12px 15px; border-bottom: 1px solid #111; color: #ccc; }
        .td-pick { font-family: 'Oswald', sans-serif; color: #444; width: 30px; font-size: 14px; }
        .td-team { width: 40px; text-align: center; }
        .td-team img { width: 24px; height: auto; opacity: 0.9; }
        .td-player { font-weight: 700; color: #fff; font-size: 13px; }
        .td-school { color: #666; font-size: 10px; letter-spacing: 0.5px; }

        .footer {
            padding: 12px;
            background-color: var(--br-black);
            font-size: 9px;
            color: #333;
            text-align: center;
            border-top: 1px solid #222;
            flex-shrink: 0;
            letter-spacing: 1px;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <div class="br-logo">B/R NFL DRAFT SHOW</div>
                <div id="apiIndicator" class="api-status">
                    <div class="status-text">ESPN CORE: CONNECTING...</div>
                    <div id="lastSyncTime" class="last-check">Extension required...</div>
                </div>
            </div>
            <div id="liveTag" class="api-status" style="color:#ff4444; font-weight:bold;">LIVE SYNC</div>
        </div>

        <div class="main-pick">
            <div class="label">ON THE CLOCK</div>
            <h1 class="pick-number" id="pickDisplay">---</h1>
        </div>

        <div class="stats-bar">
            <div class="stat-item"><div class="stat-value" id="countDisplay">0</div><div class="stat-label">Picks Left</div></div>
            <div class="stat-item"><div class="stat-value" id="timerDisplay">00:00:00</div><div class="stat-label">Est. Time</div></div>
            <div class="stat-item"><div class="stat-value">257</div><div class="stat-label">Final Pick</div></div>
        </div>

        <div class="latest-selection" id="latestCard">
            <div class="team-logo-main" id="latestLogo">
                <svg viewBox="0 0 24 24" fill="#333" width="30"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/></svg>
            </div>
            <div class="player-info">
                <p class="player-name" id="latestName">Waiting for signal...</p>
                <p class="player-detail" id="latestDetail">Direct API Sync</p>
            </div>
        </div>

        <div class="board-header">RECENT SELECTIONS</div>
        <div class="history-container">
            <table>
                <thead>
                    <tr>
                        <th class="td-pick">PK</th>
                        <th class="td-team">TM</th>
                        <th>PLAYER / SCHOOL</th>
                    </tr>
                </thead>
                <tbody id="draftBoardBody"></tbody>
            </table>
        </div>

        <div class="footer">
            ESPN CORE API V2 | FULL AUTOMATION
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'br-draft-show-v2';
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const draftPath = `artifacts/${appId}/public/data/draftState/current`;

        let currentPickNum = 0;
        let pickHistory = [];
        const apiCache = new Map();

        function format(s) {
            if (s <= 0) return "00:00:00";
            const h = Math.floor(s / 3600).toString().padStart(2, '0');
            const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
            const sec = (s % 60).toString().padStart(2, '0');
            return `${h}:${m}:${sec}`;
        }

        function updateUI() {
            if (currentPickNum === 0) return;
            
            document.getElementById('pickDisplay').innerText = currentPickNum;
            document.getElementById('countDisplay').innerText = Math.max(0, 257 - currentPickNum);
            
            let countdownSec = 0;
            for (let i = currentPickNum; i <= 257; i++) {
                countdownSec += (i >= 217) ? 139 : 174;
            }
            document.getElementById('timerDisplay').innerText = format(countdownSec);

            if (pickHistory.length > 0) {
                const latest = pickHistory[0];
                document.getElementById('latestName').innerText = latest.player;
                document.getElementById('latestDetail').innerText = `${latest.pos} | ${latest.school}`;
                if (latest.logo) {
                    document.getElementById('latestLogo').innerHTML = `<img src="${latest.logo}" alt="team">`;
                }
            }
            
            const tbody = document.getElementById('draftBoardBody');
            tbody.innerHTML = '';
            pickHistory.slice(0, 10).forEach(pick => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="td-pick">${pick.number}</td>
                    <td class="td-team">${pick.logo ? `<img src="${pick.logo}" alt="">` : ''}</td>
                    <td>
                        <div class="td-player">${pick.player || "Selection"}</div>
                        <div class="td-school">${pick.pos || ""} ${pick.school ? "| " + pick.school : ""}</div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Direct fetch with https forcing
        async function fetchDirect(url) {
            const secureUrl = url.replace('http://', 'https://');
            const res = await fetch(secureUrl);
            if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
            return await res.json();
        }

        async function resolveDetail(url) {
            if (!url) return null;
            if (apiCache.has(url)) return apiCache.get(url);
            try {
                const data = await fetchDirect(url);
                apiCache.set(url, data);
                return data;
            } catch (e) { return null; }
        }

        async function syncEspn() {
            const apiIndicator = document.getElementById('apiIndicator');
            const statusText = apiIndicator.querySelector('.status-text');
            const syncTimeText = document.getElementById('lastSyncTime');

            try {
                // 1. Get Rounds
                const roundsUrl = 'https://sports.core.api.espn.com/v2/sports/football/leagues/nfl/seasons/2026/draft/rounds?lang=en&region=us';
                const roundsData = await fetchDirect(roundsUrl);
                
                if (roundsData && roundsData.items) {
                    let allRawPicks = [];
                    let onClockPickNum = null;

                    // 2. Fetch picks for most recent rounds (backwards)
                    for (let i = roundsData.items.length - 1; i >= 0; i--) {
                        try {
                            const picksData = await fetchDirect(roundsData.items[i].picks.$ref);
                            if (picksData && picksData.items) {
                                allRawPicks = allRawPicks.concat(picksData.items);
                                // On The Clock status = 1
                                const clock = picksData.items.find(p => p.status && p.status.id === 1);
                                if (clock && !onClockPickNum) onClockPickNum = clock.overall;
                            }
                            // Stop once we have enough data
                            if (allRawPicks.filter(p => p.status && p.status.id === 3).length >= 10) break;
                        } catch(e) { continue; }
                    }

                    // 3. Resolve detail for completed picks
                    const completed = allRawPicks.filter(p => p.status && p.status.id === 3).sort((a, b) => b.overall - a.overall);
                    const latestTen = completed.slice(0, 10);

                    const resolvedHistory = [];
                    for (const p of latestTen) {
                        try {
                            const athlete = await resolveDetail(p.athlete.$ref);
                            const team = await resolveDetail(p.team.$ref);
                            resolvedHistory.push({
                                number: p.overall,
                                player: athlete ? athlete.displayName : "Selection Made",
                                pos: (athlete && athlete.position) ? athlete.position.abbreviation : "TBD",
                                school: (athlete && athlete.college) ? (athlete.college.displayName || "College") : "N/A",
                                logo: (team && team.logos) ? team.logos[0].href : null
                            });
                        } catch(e) {
                            resolvedHistory.push({ number: p.overall, player: "Syncing...", pos: "TBD", school: "", logo: null });
                        }
                    }

                    if (resolvedHistory.length > 0) {
                        pickHistory = resolvedHistory;
                        const latestMade = resolvedHistory[0].number;
                        const nextPick = onClockPickNum || (latestMade + 1);

                        if (nextPick > currentPickNum) {
                            currentPickNum = nextPick;
                            if (auth.currentUser) {
                                await db.doc(draftPath).set({ 
                                    currentPick: currentPickNum, 
                                    history: pickHistory, 
                                    lastSync: Date.now() 
                                }, { merge: true });
                            }
                        }
                    }

                    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    syncTimeText.innerText = `Sync: ${now}`;
                    statusText.innerText = "ESPN CORE: ACTIVE";
                    apiIndicator.className = 'api-status active';
                    updateUI();
                }
            } catch (e) {
                console.error("Direct fetch error", e);
                statusText.innerText = "ESPN CORE: ERROR (CORS?)";
                apiIndicator.className = 'api-status error';
                syncTimeText.innerText = "Enable CORS extension and refresh";
            }
        }

        async function initFirebaseSync() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await auth.signInWithCustomToken(__initial_auth_token);
            } else {
                await auth.signInAnonymously();
            }

            db.doc(draftPath).onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.currentPick > currentPickNum) currentPickNum = data.currentPick;
                    if (data.history) pickHistory = data.history;
                    updateUI();
                }
            }, err => console.error("Firebase Error", err));
        }

        initFirebaseSync();
        // Polling set to 25s
        setInterval(syncEspn, 25000); 
        syncEspn();
    </script>
</body>
</html>
