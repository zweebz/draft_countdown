<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 NFL Draft | Glassmorphism Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-indigo: #5856D6;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* Glassmorphism Background Orbs */
        .orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.12;
            pointer-events: none;
        }
        .orb-blue { top: -150px; left: -150px; background: var(--ios-blue); animation: drift 20s infinite alternate; }
        .orb-purple { bottom: -150px; right: -150px; background: var(--ios-indigo); animation: drift 25s infinite alternate-reverse; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 30px) scale(1.05); }
        }

        /* Core Glass Class */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.6);
        }

        .glass-bright {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .ios-pill {
            border-radius: 9999px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pulse-ios-red {
            0%, 100% { background: rgba(255, 59, 48, 0.08); border-color: rgba(255, 59, 48, 0.2); }
            50% { background: rgba(255, 59, 48, 0.2); border-color: rgba(255, 59, 48, 0.4); }
        }
        
        .on-the-clock-active {
            animation: pulse-ios-red 2s ease-in-out infinite;
        }

        .custom-scrollbar::-webkit-scrollbar { height: 3px; width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .btn-active {
            background: var(--ios-blue);
            box-shadow: 0 2px 10px rgba(0, 122, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .premium-shimmer {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.02), transparent);
            background-size: 200% 100%;
            animation: shimmer 2.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .table-row {
            transition: all 0.3s ease;
        }
        .table-row:hover {
            background: rgba(255, 255, 255, 0.04);
        }
        
        /* Helper to ensure team color glows don't overpower text */
        .team-tint {
            position: relative;
        }
        .team-tint::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--team-color, transparent);
            opacity: 0.05;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="orb orb-blue"></div>
    <div class="orb orb-purple"></div>

    <div id="app" class="max-w-5xl mx-auto px-4 py-8 relative z-10">
        <!-- Status Bar -->
        <div class="flex justify-between items-center mb-10 px-2">
            <div class="flex items-center gap-2">
                <div class="relative">
                    <div class="w-1.5 h-1.5 rounded-full bg-blue-500 shadow-[0_0_10px_#007AFF]"></div>
                    <div class="absolute inset-0 w-1.5 h-1.5 rounded-full bg-blue-500 animate-ping"></div>
                </div>
                <span class="text-[9px] font-bold tracking-[0.2em] text-white/40 uppercase italic">Ultra-Sync Realtime</span>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <span class="text-[8px] font-black text-white/20 uppercase tracking-widest">Rate</span>
                    <span class="text-[10px] font-bold text-green-400/60 tabular-nums">1.0s</span>
                </div>
                <div class="h-3 w-[1px] bg-white/10"></div>
                <span id="update-timestamp" class="text-[10px] font-bold text-white/20 uppercase tracking-widest tabular-nums"></span>
            </div>
        </div>

        <!-- Header Section -->
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-end gap-6 mb-12">
            <div class="space-y-2">
                <div class="inline-block px-2 py-0.5 glass rounded-full border-white/5 mb-1">
                    <span class="text-[8px] font-bold text-blue-400 uppercase tracking-widest leading-none">NFL Intelligence Feed</span>
                </div>
                <h1 class="text-4xl font-black tracking-tight leading-none">2026 NFL Draft</h1>
                <p class="text-white/30 font-medium max-w-xs text-xs" id="draft-status-text">Calibrating selection board...</p>
            </div>

            <div class="flex flex-wrap gap-3 justify-end w-full lg:w-auto">
                <!-- Dashboard -->
                <div class="glass rounded-2xl p-4 px-6 flex items-center gap-6">
                    <div>
                        <p class="text-[8px] font-bold text-white/20 uppercase tracking-widest mb-1">Est. Completion</p>
                        <p id="total-countdown" class="text-xl font-bold tracking-tighter tabular-nums text-blue-500">--:--:--</p>
                    </div>
                    <div class="w-[1px] h-6 bg-white/10"></div>
                    <div>
                        <p class="text-[8px] font-bold text-white/20 uppercase tracking-widest mb-1">Remaining</p>
                        <p id="remaining-picks-count" class="text-xl font-bold tracking-tighter tabular-nums text-white">--</p>
                    </div>
                </div>

                <!-- Active Spotlight -->
                <div id="clock-container" class="hidden">
                    <div class="on-the-clock-active glass rounded-2xl p-4 px-6 flex items-center gap-4 border shadow-xl">
                        <div class="w-10 h-10 glass-bright rounded-xl flex items-center justify-center p-2">
                            <img id="clock-team-logo" src="" class="w-full h-full object-contain hidden" alt="">
                            <span id="clock-team-id" class="text-[10px] font-bold text-white/20">--</span>
                        </div>
                        <div>
                            <p class="text-[8px] font-bold text-red-500 uppercase tracking-widest mb-0.5">On The Clock</p>
                            <p class="text-lg font-black text-white tracking-tight uppercase" id="clock-team-name">--</p>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Round Selection -->
        <nav class="flex gap-2 mb-8 overflow-x-auto pb-4 custom-scrollbar" id="round-nav">
            <!-- Buttons injected here -->
        </nav>

        <!-- Main Board -->
        <div class="glass rounded-[1.5rem] overflow-hidden shadow-2xl border-white/5">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="glass-bright text-white/20 text-[9px] font-bold uppercase tracking-[0.2em] border-b border-white/5">
                            <th class="px-6 py-4">Pick</th>
                            <th class="px-6 py-4">Franchise</th>
                            <th class="px-6 py-4">Selection Detail</th>
                        </tr>
                    </thead>
                    <tbody id="pick-rows" class="divide-y divide-white/5">
                        <tr class="premium-shimmer"><td colspan="3" class="h-24"></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <footer class="mt-16 flex flex-col md:flex-row justify-between items-center gap-6 border-t border-white/5 pt-10 text-white/20">
            <div class="flex items-center gap-6">
                <div class="flex flex-col">
                    <span class="text-[7px] font-black uppercase tracking-widest mb-0.5 opacity-40">Intelligence Core</span>
                    <span class="text-[10px] font-bold tracking-widest uppercase">ESPN Core v2.0</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[7px] font-black uppercase tracking-widest mb-0.5 opacity-40">Latency</span>
                    <span id="ping-timer" class="text-[10px] font-bold tracking-widest uppercase text-green-500/40">--ms</span>
                </div>
            </div>
            
            <div class="flex flex-col items-center md:items-end">
                <span class="text-[7px] font-black uppercase tracking-[0.3em] mb-0.5 text-blue-500/60">Live Draft Protocol</span>
                <span class="text-[10px] font-bold tracking-widest uppercase italic opacity-40">1s Update Cycle Active</span>
            </div>
        </footer>
    </div>

    <script>
        const API_URL = 'https://sports.core.api.espn.com/v2/sports/football/leagues/nfl/seasons/2026/draft/rounds?lang=en&region=us';
        const ATHLETE_BASE_URL = 'https://sports.core.api.espn.com/v2/sports/football/leagues/nfl/seasons/2026/draft/athletes';
        const REFRESH_INTERVAL = 1000;
        const TOTAL_PICKS = 257;
        const MINUTES_PER_PICK_R7 = 4;

        const cache = {
            athletes: new Map(),
            teams: new Map(),
            loading: new Set()
        };

        let currentData = null;
        let lastDataHash = "";
        let activeRoundNumber = null;
        let isRefreshing = false;

        function getId(ref) {
            if (!ref) return null;
            const parts = ref.split('/');
            return parts[parts.length - 1].split('?')[0];
        }

        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash;
        }

        async function fetchDetails(type, id, urlOverride = null) {
            const cacheKey = `${type}-${id}`;
            if (cache[type].has(id) || cache.loading.has(cacheKey)) return;
            
            cache.loading.add(cacheKey);
            try {
                const url = urlOverride ? urlOverride.replace('http:', 'https:') : `${ATHLETE_BASE_URL}/${id}?lang=en&region=us`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (type === 'athletes') {
                    cache.athletes.set(id, {
                        name: data.displayName || 'Unknown Prospect',
                        position: data.position?.abbreviation || 'TBD',
                        school: data.college?.name || null
                    });
                } else if (type === 'teams') {
                    cache.teams.set(id, {
                        name: data.displayName || data.shortDisplayName || data.name || 'Franchise',
                        logo: data.logos?.[0]?.href || null,
                        color: data.color ? `#${data.color}` : null
                    });
                }
                
                renderPicks();
                updateLiveIndicator();
            } catch (err) {
                console.error(`Fetch error:`, err);
            } finally {
                cache.loading.delete(cacheKey);
            }
        }

        async function fetchDraftData() {
            if (isRefreshing) return;
            isRefreshing = true;
            
            const start = performance.now();
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('API Unavailable');
                
                const rawJson = await response.text();
                const currentHash = simpleHash(rawJson);
                
                if (currentHash !== lastDataHash) {
                    const data = JSON.parse(rawJson);
                    currentData = data;
                    lastDataHash = currentHash;
                    
                    if (activeRoundNumber === null) {
                        const liveRound = data.items.find(r => r.status?.type?.state === 'in');
                        activeRoundNumber = liveRound ? liveRound.number : 1;
                    }

                    updateUI();
                    
                    const statusText = document.getElementById('draft-status-text');
                    statusText.innerText = liveRoundLabel();
                }

                const now = new Date();
                document.getElementById('update-timestamp').innerText = now.toLocaleTimeString([], {hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit'});
                
                const end = performance.now();
                document.getElementById('ping-timer').innerText = `${Math.round(end - start)}ms`;
                
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('draft-status-text').innerText = "Signal Loss - Reconnecting...";
            } finally {
                isRefreshing = false;
            }
        }

        function liveRoundLabel() {
            const liveRound = currentData.items.find(r => r.status?.type?.state === 'in');
            return liveRound ? `Round ${liveRound.number} • Selections Active` : "Broadcasting Finalized Feed";
        }

        function updateUI() {
            renderRoundNav();
            renderPicks();
            updateLiveIndicator();
            calculateCountdown();
        }

        function calculateCountdown() {
            const allPicks = currentData.items.flatMap(r => r.picks || []);
            const completedPicksCount = allPicks.filter(p => p.status?.name === "SELECTION_MADE").length;
            const remainingPicksCount = TOTAL_PICKS - completedPicksCount;
            
            document.getElementById('remaining-picks-count').innerText = remainingPicksCount;

            let totalSecondsRemaining = remainingPicksCount * MINUTES_PER_PICK_R7 * 60;
            const hours = Math.floor(totalSecondsRemaining / 3600);
            const minutes = Math.floor((totalSecondsRemaining % 3600) / 60);
            const seconds = totalSecondsRemaining % 60;

            document.getElementById('total-countdown').innerText = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function renderRoundNav() {
            const nav = document.getElementById('round-nav');
            nav.innerHTML = '';
            
            currentData.items.forEach(round => {
                const btn = document.createElement('button');
                const isLive = round.status?.type?.state === 'in';
                const isActive = activeRoundNumber === round.number;
                
                btn.className = `ios-pill px-5 py-1.5 text-[11px] font-bold transition-all whitespace-nowrap ${
                    isActive 
                    ? 'btn-active text-white' 
                    : 'glass text-white/30 hover:text-white hover:bg-white/5'
                }`;
                
                btn.innerHTML = `Round ${round.number} ${isLive ? '<span class="ml-1 w-1 h-1 rounded-full bg-red-500 inline-block animate-pulse shadow-[0_0_5px_#FF3B30]"></span>' : ''}`;
                btn.onclick = () => {
                    activeRoundNumber = round.number;
                    updateUI();
                };
                nav.appendChild(btn);
            });
        }

        function renderPicks() {
            const round = currentData.items.find(r => r.number === activeRoundNumber);
            const tbody = document.getElementById('pick-rows');
            
            if (!round || !round.picks) return;

            const firstOnClockOverall = round.picks.find(p => p.status?.name === "ON_THE_CLOCK")?.overall;

            tbody.innerHTML = '';
            round.picks.forEach(pick => {
                const teamId = getId(pick.team?.$ref);
                const athleteId = getId(pick.athlete?.$ref);
                const isStatusOnClock = pick.status?.name === "ON_THE_CLOCK";
                const isSelected = pick.status?.name === "SELECTION_MADE";
                const isTrulyOnClock = isStatusOnClock && pick.overall === firstOnClockOverall;

                if (teamId && !cache.teams.has(teamId)) fetchDetails('teams', teamId, pick.team.$ref);
                const team = cache.teams.get(teamId);

                let playerHtml = '';
                if (isSelected && athleteId) {
                    if (cache.athletes.has(athleteId)) {
                        const player = cache.athletes.get(athleteId);
                        playerHtml = `
                            <div class="flex flex-col">
                                <div class="flex items-center gap-2 mb-0.5">
                                    <span class="text-blue-400 text-[8px] font-black uppercase tracking-wider leading-none">Drafted</span>
                                    ${pick.traded ? '<span class="bg-white/5 text-white/30 text-[7px] font-bold px-1.5 py-0.5 rounded-full uppercase tracking-widest border border-white/5">Traded</span>' : ''}
                                </div>
                                <span class="text-sm font-bold text-white tracking-tight leading-none mb-0.5">${player.name}</span>
                                <span class="text-[10px] text-white/40 font-medium uppercase tracking-widest">
                                    ${player.position} ${player.school ? `• ${player.school}` : ''}
                                </span>
                                ${pick.traded ? `<span class="text-[9px] text-white/20 font-medium italic mt-1 leading-tight">${pick.tradeNote}</span>` : ''}
                            </div>
                        `;
                    } else {
                        fetchDetails('athletes', athleteId);
                        playerHtml = `<div class="premium-shimmer h-8 w-40 rounded-lg bg-white/5"></div>`;
                    }
                } else {
                    playerHtml = `
                        <div class="flex flex-col gap-2">
                            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border ${isTrulyOnClock ? 'bg-red-500/10 text-red-500 border-red-500/30 shadow-[0_0_10px_rgba(255,59,48,0.05)]' : 'bg-white/5 text-white/20 border-white/5'}">
                                <span class="text-[9px] font-black uppercase tracking-widest leading-none">
                                    ${isTrulyOnClock ? 'On Clock' : (isStatusOnClock ? 'Upcoming' : (pick.status?.description || 'Waiting'))}
                                </span>
                            </div>
                            ${pick.traded ? `<div class="flex items-center gap-1.5"><span class="w-1 h-1 rounded-full bg-white/20"></span><span class="text-[9px] text-white/20 font-medium tracking-widest uppercase">${pick.tradeNote}</span></div>` : ''}
                        </div>
                    `;
                }

                const tr = document.createElement('tr');
                tr.className = `table-row team-tint transition-all duration-500 ${isTrulyOnClock ? 'bg-red-500/[0.04]' : ''}`;
                if (team?.color) {
                    tr.style.setProperty('--team-color', team.color);
                }
                
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-2xl font-black text-white/10 tracking-tighter tabular-nums leading-none mb-0.5">#${pick.overall || pick.pick}</div>
                        <div class="text-[8px] text-white/20 font-bold uppercase tracking-widest">Pick ${pick.pick}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 glass-bright rounded-xl p-2 flex items-center justify-center shadow-lg" style="${team?.color ? `border-color: ${team.color}44; box-shadow: 0 0 10px ${team.color}11;` : ''}">
                                ${team?.logo ? `<img src="${team.logo}" class="w-full h-full object-contain opacity-80" />` : `<span class="text-[9px] font-black text-white/10">${teamId}</span>`}
                            </div>
                            <div class="flex flex-col">
                                <span class="text-sm font-bold text-white tracking-tight leading-none mb-0.5">${team?.name || 'Syncing...'}</span>
                                <span class="text-[9px] text-white/20 font-bold uppercase tracking-[0.1em]">NFL Franchise</span>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        ${playerHtml}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateLiveIndicator() {
            const allPicks = currentData.items.flatMap(r => r.picks || []);
            const onClock = allPicks.find(p => p.status?.name === "ON_THE_CLOCK");
            const clockContainer = document.getElementById('clock-container');

            if (onClock) {
                const teamId = getId(onClock.team?.$ref);
                const team = cache.teams.get(teamId);
                
                document.getElementById('clock-team-name').innerText = team ? team.name : 'Resolving...';
                const logoImg = document.getElementById('clock-team-logo');
                const idText = document.getElementById('clock-team-id');
                
                if (team?.logo) {
                    logoImg.src = team.logo;
                    logoImg.classList.remove('hidden');
                    idText.classList.add('hidden');
                } else {
                    idText.innerText = teamId;
                    idText.classList.remove('hidden');
                    logoImg.classList.add('hidden');
                }
                
                clockContainer.classList.remove('hidden');
            } else {
                clockContainer.classList.add('hidden');
            }
        }

        setInterval(fetchDraftData, REFRESH_INTERVAL);
        fetchDraftData();
    </script>
</body>
</html>
