<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B/R LIVE | 2026 NFL Draft Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap');

        :root {
            --br-black: #0a0a0a;
            --br-grey: #1a1a1a;
            --br-light-grey: #333333;
            --br-white: #ffffff;
            --br-rainbow: linear-gradient(90deg, #FFB7B2, #FFDAC1, #E2F0CB, #B5EAD7, #C7CEEA, #FFB7B2, #FFDAC1);
        }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background-color: var(--br-black);
            color: var(--br-white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-transform: uppercase;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: var(--br-grey);
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            overflow: hidden;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        /* Active RGB Shimmer Border */
        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: var(--br-rainbow);
            background-size: 300% auto;
            animation: shimmer 3s linear infinite;
            z-index: 10;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .header {
            background-color: var(--br-black);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--br-light-grey);
            flex-shrink: 0;
        }

        .br-logo {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 18px;
            background: var(--br-rainbow);
            background-size: 300% auto;
            animation: shimmer 3s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .api-status {
            font-size: 9px;
            color: #444;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .status-text { display: flex; align-items: center; gap: 5px; }
        .api-status.active .status-text { color: #B5EAD7; }
        .api-status.error .status-text { color: #FFB7B2; }
        .last-check { font-size: 8px; color: #666; text-transform: none; }

        .main-pick {
            padding: 25px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #222 0%, #0a0a0a 100%);
            flex-shrink: 0;
        }

        .pick-number {
            font-family: 'Oswald', sans-serif;
            font-size: 110px;
            line-height: 1;
            font-weight: 700;
            margin: 0;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            background-color: var(--br-black);
            padding: 12px 0;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }

        .stat-item { text-align: center; border-right: 1px solid #222; }
        .stat-item:last-child { border-right: none; }

        .stat-value {
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            background: var(--br-rainbow);
            background-size: 300% auto;
            animation: shimmer 3s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label { font-size: 9px; color: #666; letter-spacing: 1px; margin-top: 2px; }

        /* Latest Selection Card */
        .latest-selection {
            background-color: #000;
            margin: 15px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            flex-shrink: 0;
        }

        .latest-selection::after {
            content: "LATEST SELECTION";
            position: absolute;
            top: -8px;
            left: 15px;
            background: var(--br-rainbow);
            background-size: 300% auto;
            animation: shimmer 3s linear infinite;
            color: #000;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .team-logo-main {
            width: 55px; height: 55px;
            background: #111; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            padding: 5px;
            border: 1px solid #222;
        }
        .team-logo-main img { width: 100%; height: auto; }

        .player-info { text-align: left; overflow: hidden; }
        .player-name { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; color: #fff; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-detail { font-size: 12px; color: #888; margin: 0; }

        /* Full Draft Board */
        .board-header {
            padding: 10px 15px;
            background: #111;
            font-size: 10px;
            letter-spacing: 1px;
            color: #555;
            font-weight: 700;
            border-bottom: 1px solid #222;
        }

        .history-container {
            flex-grow: 1;
            overflow-y: auto;
            background: #050505;
        }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th {
            position: sticky; top: 0; background: #111;
            padding: 8px 15px; text-align: left; color: #444;
            font-size: 9px; z-index: 5;
        }
        td { padding: 12px 15px; border-bottom: 1px solid #111; color: #ccc; }
        .td-pick { font-family: 'Oswald', sans-serif; color: #444; width: 30px; font-size: 14px; }
        .td-team { width: 40px; text-align: center; }
        .td-team img { width: 24px; height: auto; opacity: 0.9; }
        .td-player { font-weight: 700; color: #fff; font-size: 13px; }
        .td-school { color: #666; font-size: 10px; letter-spacing: 0.5px; }

        .controls { padding: 20px; background-color: var(--br-grey); flex-shrink: 0; border-top: 1px solid #222; }

        .btn-next {
            background: var(--br-rainbow);
            background-size: 300% auto;
            animation: shimmer 3s linear infinite;
            color: #000;
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            font-weight: 700;
            border-radius: 4px;
            padding: 16px;
            cursor: pointer;
            border: none;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-next:active { transform: scale(0.98); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <div class="br-logo">B/R NFL DRAFT SHOW</div>
                <div id="apiIndicator" class="api-status">
                    <div class="status-text">ESPN API: CONNECTING...</div>
                    <div id="lastSyncTime" class="last-check">Authenticating...</div>
                </div>
            </div>
            <div class="live-tag">LIVE</div>
        </div>

        <div class="main-pick">
            <div style="font-size: 12px; letter-spacing: 4px; color: #666; margin-bottom: 5px;">ON THE CLOCK</div>
            <h1 class="pick-number" id="pickDisplay">204</h1>
        </div>

        <div class="stats-bar">
            <div class="stat-item"><div class="stat-value" id="countDisplay">53</div><div class="stat-label">Picks Left</div></div>
            <div class="stat-item"><div class="stat-value" id="timerDisplay">00:00:00</div><div class="stat-label">Est. Time</div></div>
            <div class="stat-item"><div class="stat-value">257</div><div class="stat-label">Final Pick</div></div>
        </div>

        <div class="latest-selection" id="latestCard">
            <div class="team-logo-main" id="latestLogo">
                <svg viewBox="0 0 24 24" fill="#333" width="30"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/></svg>
            </div>
            <div class="player-info">
                <p class="player-name" id="latestName">Syncing Board...</p>
                <p class="player-detail" id="latestDetail">Fetching latest data</p>
            </div>
        </div>

        <div class="board-header">RECENT SELECTIONS</div>
        <div class="history-container">
            <table>
                <thead>
                    <tr>
                        <th class="td-pick">PK</th>
                        <th class="td-team">TM</th>
                        <th>PLAYER / SCHOOL</th>
                    </tr>
                </thead>
                <tbody id="draftBoardBody"></tbody>
            </table>
        </div>

        <div class="controls">
            <button class="btn-next" id="mainBtn" onclick="submitPick()">Submit Pick 204</button>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button style="flex: 1; background: transparent; color: #444; border: 1px solid #222; font-size: 10px; padding: 6px; cursor: pointer; border-radius: 4px;" onclick="resetTo204()">Reset Tracker</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore-compat.js"></script>

    <script>
        const config = {
            apiKey: "AIzaSyDecV3qGqmwD6T7B2TAHfb3FT5jegIWBLk",
            authDomain: "drafttracker-b6720.firebaseapp.com",
            projectId: "drafttracker-b6720",
            storageBucket: "drafttracker-b6720.firebasestorage.app",
            messagingSenderId: "745753068393",
            appId: "1:745753068393:web:5188024ae9abc9bd3573f8"
        };

        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const draftPath = `artifacts/${config.projectId}/public/data/draftState/current`;

        let currentPick = 204;
        let pickHistory = [];
        let cache = { athletes: {}, teams: {} };

        function format(s) {
            if (s <= 0) return "00:00:00";
            const h = Math.floor(s / 3600).toString().padStart(2, '0');
            const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
            const sec = (s % 60).toString().padStart(2, '0');
            return `${h}:${m}:${sec}`;
        }

        function updateUI() {
            document.getElementById('pickDisplay').innerText = currentPick;
            document.getElementById('countDisplay').innerText = Math.max(0, 257 - currentPick);
            document.getElementById('mainBtn').innerText = currentPick > 257 ? "DRAFT COMPLETE" : `Submit Pick ${currentPick}`;
            
            let countdownSec = 0;
            for (let i = currentPick; i <= 257; i++) {
                countdownSec += (i >= 217) ? 139 : 174;
            }
            document.getElementById('timerDisplay').innerText = format(countdownSec);

            if (pickHistory.length > 0) {
                const latest = pickHistory[0];
                document.getElementById('latestName').innerText = latest.player || "Selected";
                document.getElementById('latestDetail').innerText = `${latest.pos || "-"} | ${latest.school || "-"}`;
                if (latest.logo) {
                    document.getElementById('latestLogo').innerHTML = `<img src="${latest.logo}" alt="team">`;
                }
            }
            
            const tbody = document.getElementById('draftBoardBody');
            tbody.innerHTML = '';
            pickHistory.slice(0, 15).forEach(pick => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="td-pick">${pick.number}</td>
                    <td class="td-team">${pick.logo ? `<img src="${pick.logo}" alt="">` : '-'}</td>
                    <td>
                        <div class="td-player">${pick.player || "Loading..."}</div>
                        <div class="td-school">${pick.pos || ""} | ${pick.school || ""}</div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        async function submitPick() {
            if (currentPick <= 257) {
                currentPick++;
                updateUI();
                if (!auth.currentUser) await auth.signInAnonymously();
                await db.doc(draftPath).set({ currentPick, lastUpdated: Date.now() }, { merge: true });
                fetchEspnDraft();
            }
        }

        // --- IMPROVED RESILIENT API PROXY ---
        async function fetchWithProxy(url) {
            // Force HTTPS for Core API
            const secureUrl = url.replace('http://', 'https://');
            
            // Try Proxy 1: AllOrigins
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(secureUrl)}&t=${Date.now()}`);
                if (res.ok) {
                    const json = await res.json();
                    return JSON.parse(json.contents);
                }
            } catch (e) {
                console.warn("AllOrigins failed, trying CorsProxy.io...");
            }

            // Try Proxy 2: CorsProxy.io
            try {
                const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(secureUrl)}`);
                if (res.ok) return await res.json();
            } catch (e) {
                console.error("CorsProxy also failed.");
            }

            throw new Error("Failed to fetch via all proxies");
        }

        async function getDetail(url, cacheType) {
            if (!url) return null;
            if (cache[cacheType][url]) return cache[cacheType][url];
            try {
                const data = await fetchWithProxy(url);
                cache[cacheType][url] = data;
                return data;
            } catch (e) { return null; }
        }

        async function fetchEspnDraft() {
            const apiIndicator = document.getElementById('apiIndicator');
            const statusText = apiIndicator.querySelector('.status-text');
            const syncTimeText = document.getElementById('lastSyncTime');

            try {
                // Correct Core API URL (forced HTTPS for security)
                const picksUrl = 'https://sports.core.api.espn.com/v2/sports/football/leagues/nfl/seasons/2026/draft/picks?limit=257';
                const picksData = await fetchWithProxy(picksUrl);
                
                if (picksData && picksData.items) {
                    const sortedPicks = picksData.items.sort((a, b) => b.number - a.number);
                    // Filter for picks that actually have an athlete (are completed)
                    const rawHistory = sortedPicks.filter(p => p.athlete).slice(0, 10);

                    const resolvedHistory = await Promise.all(rawHistory.map(async p => {
                        const athlete = await getDetail(p.athlete.$ref, 'athletes');
                        const team = await getDetail(p.team.$ref, 'teams');
                        return {
                            number: p.number,
                            player: athlete ? athlete.displayName : "Unknown",
                            pos: athlete && athlete.position ? athlete.position.abbreviation : "",
                            school: athlete && athlete.collegeAthlete ? athlete.collegeAthlete.school.name : (athlete && athlete.college ? athlete.college.name : ""),
                            logo: team && team.logos ? team.logos[0].href : null
                        };
                    }));

                    if (resolvedHistory.length > 0) {
                        pickHistory = resolvedHistory;
                        const latestMade = pickHistory[0].number;
                        
                        if (latestMade + 1 > currentPick) {
                            currentPick = latestMade + 1;
                            syncWithFirebase();
                        }
                    }

                    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    syncTimeText.innerText = `Sync: ${now}`;
                    statusText.innerText = "ESPN API: LIVE";
                    apiIndicator.className = 'api-status active';
                    updateUI();
                }
            } catch (e) {
                console.error("Fetch Error", e);
                statusText.innerText = "ESPN API: ERR/OFFLINE";
                apiIndicator.className = 'api-status error';
            }
        }

        async function syncWithFirebase() {
            if (!auth.currentUser) await auth.signInAnonymously();
            await db.doc(draftPath).set({ 
                currentPick, 
                history: pickHistory.slice(0, 15),
                lastUpdated: Date.now() 
            }, { merge: true });
        }

        setInterval(fetchEspnDraft, 30000); // 30s interval to prevent proxy rate limiting
        fetchEspnDraft();

        async function resetTo204() {
            if (confirm("Reset to Pick 204?")) {
                currentPick = 204;
                pickHistory = [];
                updateUI();
                if (!auth.currentUser) await auth.signInAnonymously();
                await db.doc(draftPath).set({ currentPick: 204, history: [] }, { merge: true });
            }
        }

        async function startSync() {
            if (!auth.currentUser) await auth.signInAnonymously();
            db.doc(draftPath).onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.currentPick && data.currentPick > currentPick) {
                        currentPick = data.currentPick;
                    }
                    if (data.history && (!pickHistory.length || data.history[0].number > pickHistory[0].number)) {
                        pickHistory = data.history;
                    }
                    updateUI();
                }
            });
        }

        updateUI();
        startSync();
    </script>
</body>
</html>
