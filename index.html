<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 NFL Draft Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; }

        @keyframes pulse-red {
            0%, 100% { background-color: rgba(220, 38, 38, 1); border-color: rgba(239, 68, 68, 1); }
            50% { background-color: rgba(153, 27, 27, 1); border-color: rgba(220, 38, 38, 0.5); }
        }
        
        .on-the-clock-pulse {
            animation: pulse-red 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .team-logo-shadow { filter: drop-shadow(0 0 8px rgba(0,0,0,0.5)); }
        
        .loading-shimmer {
            background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div id="app" class="max-w-6xl mx-auto px-4 py-6 md:py-10">
        <!-- Header -->
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 mb-10 border-b border-slate-800 pb-10">
            <div class="space-y-2">
                <div class="flex items-center gap-3">
                    <span class="bg-blue-600 text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-[0.2em]">NFL • 2026</span>
                    <div class="w-1 h-1 rounded-full bg-slate-700"></div>
                    <span class="text-slate-500 text-[10px] font-black uppercase tracking-widest">Draft Central</span>
                </div>
                <h1 class="text-4xl md:text-5xl font-black tracking-tighter italic uppercase leading-none">
                    Live <span class="text-blue-500">Board</span>
                </h1>
                <div class="flex items-center gap-3">
                    <p class="text-slate-400 text-sm font-bold flex items-center gap-2" id="draft-status-text">
                        <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                        Connecting to Feed...
                    </p>
                    <span id="update-timestamp" class="text-[10px] text-slate-600 uppercase font-black"></span>
                </div>
            </div>

            <!-- Advanced Draft Completion Clock -->
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex items-center gap-4 shadow-xl">
                <div class="text-right">
                    <p class="text-[9px] uppercase font-black text-slate-500 tracking-widest">Estimated Time To Conclusion</p>
                    <p id="total-countdown" class="text-2xl font-black text-blue-500 tracking-tighter">--:--:--</p>
                </div>
                <div class="h-10 w-[1px] bg-slate-800"></div>
                <div class="text-left">
                    <p class="text-[9px] uppercase font-black text-slate-500 tracking-widest">Remaining Picks</p>
                    <p id="remaining-picks-count" class="text-2xl font-black text-white tracking-tighter">--</p>
                </div>
            </div>

            <!-- On The Clock Spotlight -->
            <div id="clock-container" class="hidden w-full lg:w-80">
                <div class="on-the-clock-pulse rounded-2xl p-4 shadow-2xl border flex items-center gap-4 transition-all duration-500">
                    <div class="relative">
                        <div class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center backdrop-blur-sm overflow-hidden border border-white/10">
                            <img id="clock-team-logo" src="" class="w-8 h-8 object-contain team-logo-shadow hidden" alt="">
                            <span id="clock-team-id" class="text-lg font-black text-white/50 italic">--</span>
                        </div>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase font-black text-red-100 tracking-[0.15em] mb-0.5">On The Clock</p>
                        <p class="text-xl font-black text-white italic tracking-tight uppercase leading-tight" id="clock-team-name">Loading...</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Round Navigation -->
        <nav class="flex gap-2 mb-8 overflow-x-auto pb-4 custom-scrollbar" id="round-nav">
            <!-- Buttons injected here -->
        </nav>

        <!-- Draft Board Table -->
        <div class="bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-950/80 backdrop-blur-md text-slate-500 text-[10px] uppercase font-black tracking-[0.2em] border-b border-slate-800">
                            <th class="px-8 py-5">Pick</th>
                            <th class="px-8 py-5">Team</th>
                            <th class="px-8 py-5">Selection / Player Profile</th>
                        </tr>
                    </thead>
                    <tbody id="pick-rows" class="divide-y divide-slate-800/50">
                        <tr class="loading-shimmer"><td colspan="3" class="h-24"></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <footer class="mt-12 flex flex-col md:flex-row justify-between items-center gap-6 border-t border-slate-800 pt-8">
            <div class="flex items-center gap-4">
                <div class="bg-slate-800 px-3 py-1 rounded-md">
                    <p class="text-slate-500 text-[10px] uppercase tracking-widest font-black">Data Source: ESPN Core API</p>
                </div>
                <div class="bg-slate-800 px-3 py-1 rounded-md">
                    <p class="text-slate-500 text-[10px] uppercase tracking-widest font-black">Calculation: 4m/Pick (R7)</p>
                </div>
            </div>
            <button onclick="fetchDraftData()" class="group bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl text-xs font-black uppercase tracking-widest transition-all flex items-center gap-3 active:scale-95 shadow-lg shadow-blue-900/20">
                <svg class="w-4 h-4 group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Sync Live Data
            </button>
        </footer>
    </div>

    <script>
        const API_URL = 'https://sports.core.api.espn.com/v2/sports/football/leagues/nfl/seasons/2026/draft/rounds?lang=en&region=us';
        const ATHLETE_BASE_URL = 'https://sports.core.api.espn.com/v2/sports/football/leagues/nfl/seasons/2026/draft/athletes';
        const REFRESH_INTERVAL = 45000;
        const TOTAL_PICKS = 257;
        const MINUTES_PER_PICK_R7 = 4;

        const cache = {
            athletes: new Map(),
            teams: new Map(),
            loading: new Set()
        };

        let currentData = null;
        let activeRoundNumber = null;
        let isRefreshing = false;

        function getId(ref) {
            if (!ref) return null;
            const parts = ref.split('/');
            return parts[parts.length - 1].split('?')[0];
        }

        async function fetchDetails(type, id, urlOverride = null) {
            const cacheKey = `${type}-${id}`;
            if (cache[type].has(id) || cache.loading.has(cacheKey)) return;
            
            cache.loading.add(cacheKey);
            try {
                const url = urlOverride ? urlOverride.replace('http:', 'https:') : `${ATHLETE_BASE_URL}/${id}?lang=en&region=us`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Detail fetch error');
                const data = await response.json();
                
                if (type === 'athletes') {
                    cache.athletes.set(id, {
                        name: data.displayName || 'Unknown Player',
                        position: data.position?.abbreviation || 'N/A',
                        school: data.college?.name || null
                    });
                } else if (type === 'teams') {
                    cache.teams.set(id, {
                        name: data.displayName || data.name || 'Team',
                        logo: data.logos?.[0]?.href || null,
                        color: data.color || '1e293b'
                    });
                }
                
                renderPicks();
                updateLiveIndicator();
            } catch (err) {
                console.error(`Error fetching ${type} ${id}:`, err);
            } finally {
                cache.loading.delete(cacheKey);
            }
        }

        async function fetchDraftData() {
            if (isRefreshing) return;
            isRefreshing = true;
            
            const statusText = document.getElementById('draft-status-text');
            statusText.innerText = "Syncing Rounds...";

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('API Unavailable');
                
                const data = await response.json();
                currentData = data;
                
                if (activeRoundNumber === null) {
                    const liveRound = data.items.find(r => r.status?.type?.state === 'in');
                    activeRoundNumber = liveRound ? liveRound.number : 1;
                }

                updateUI();
                
                const now = new Date();
                document.getElementById('update-timestamp').innerText = `Sync: ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                statusText.innerText = liveRoundLabel();
            } catch (error) {
                console.error("Fetch error:", error);
                statusText.innerText = "Data Sync Error";
            } finally {
                isRefreshing = false;
            }
        }

        function liveRoundLabel() {
            const liveRound = currentData.items.find(r => r.status?.type?.state === 'in');
            return liveRound ? `Round ${liveRound.number} Live` : "Finalized Draft Board";
        }

        function updateUI() {
            renderRoundNav();
            renderPicks();
            updateLiveIndicator();
            calculateCountdown();
        }

        function calculateCountdown() {
            const allPicks = currentData.items.flatMap(r => r.picks || []);
            const completedPicksCount = allPicks.filter(p => p.status?.name === "SELECTION_MADE").length;
            const remainingPicksCount = TOTAL_PICKS - completedPicksCount;
            
            document.getElementById('remaining-picks-count').innerText = remainingPicksCount;

            // Advanced Calculation: 4 mins per remaining pick (standard for R7)
            // Plus an additional factor for "on the clock" time if available
            let totalSecondsRemaining = remainingPicksCount * MINUTES_PER_PICK_R7 * 60;
            
            const hours = Math.floor(totalSecondsRemaining / 3600);
            const minutes = Math.floor((totalSecondsRemaining % 3600) / 60);
            const seconds = totalSecondsRemaining % 60;

            document.getElementById('total-countdown').innerText = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function renderRoundNav() {
            const nav = document.getElementById('round-nav');
            nav.innerHTML = '';
            
            currentData.items.forEach(round => {
                const btn = document.createElement('button');
                const isLive = round.status?.type?.state === 'in';
                const isActive = activeRoundNumber === round.number;
                
                btn.className = `px-6 py-3 rounded-2xl text-[11px] font-black tracking-widest uppercase transition-all whitespace-nowrap border ${
                    isActive 
                    ? 'bg-blue-600 border-blue-400 text-white shadow-xl shadow-blue-900/40 translate-y-[-2px]' 
                    : 'bg-slate-800/50 border-slate-700 text-slate-500 hover:bg-slate-700 hover:text-slate-300'
                }`;
                
                btn.innerHTML = `Round ${round.number} ${isLive ? '<span class="ml-2 w-2 h-2 rounded-full bg-red-500 inline-block animate-ping"></span>' : ''}`;
                btn.onclick = () => {
                    activeRoundNumber = round.number;
                    updateUI();
                };
                nav.appendChild(btn);
            });
        }

        function renderPicks() {
            const round = currentData.items.find(r => r.number === activeRoundNumber);
            const tbody = document.getElementById('pick-rows');
            
            if (!round || !round.picks) return;

            const firstOnClockOverall = round.picks.find(p => p.status?.name === "ON_THE_CLOCK")?.overall;

            tbody.innerHTML = '';
            round.picks.forEach(pick => {
                const teamId = getId(pick.team?.$ref);
                const athleteId = getId(pick.athlete?.$ref);
                const isStatusOnClock = pick.status?.name === "ON_THE_CLOCK";
                const isSelected = pick.status?.name === "SELECTION_MADE";
                const isTrulyOnClock = isStatusOnClock && pick.overall === firstOnClockOverall;

                if (teamId && !cache.teams.has(teamId)) fetchDetails('teams', teamId, pick.team.$ref);
                const team = cache.teams.get(teamId);

                let playerHtml = '';
                if (isSelected && athleteId) {
                    if (cache.athletes.has(athleteId)) {
                        const player = cache.athletes.get(athleteId);
                        playerHtml = `
                            <div class="flex flex-col gap-0.5">
                                <div class="flex items-center gap-2">
                                    <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest leading-none">Drafted</span>
                                    ${pick.traded ? '<span class="bg-amber-500/10 text-amber-500 text-[8px] font-black px-1.5 py-0.5 rounded uppercase border border-amber-500/20">Traded Pick</span>' : ''}
                                </div>
                                <span class="text-lg font-black text-white tracking-tight uppercase">${player.name}</span>
                                <span class="text-[11px] text-slate-500 font-bold uppercase tracking-widest">
                                    ${player.position} ${player.school ? `• ${player.school}` : ''}
                                </span>
                                ${pick.traded ? `<span class="text-[10px] text-slate-600 font-medium italic mt-0.5">${pick.tradeNote}</span>` : ''}
                            </div>
                        `;
                    } else {
                        fetchDetails('athletes', athleteId);
                        playerHtml = `<div class="flex flex-col gap-2"><div class="h-3 w-16 bg-slate-800 animate-pulse rounded"></div><div class="h-6 w-48 bg-slate-800 animate-pulse rounded-lg"></div></div>`;
                    }
                } else {
                    playerHtml = `
                        <div class="flex flex-col gap-3">
                            <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border w-fit ${isTrulyOnClock ? 'bg-red-600/10 border-red-500/50 text-red-500 animate-pulse' : 'bg-slate-800 border-slate-700 text-slate-500'}">
                                <span class="text-[10px] font-black uppercase tracking-widest">
                                    ${isTrulyOnClock ? 'On The Clock' : (isStatusOnClock ? 'Upcoming' : (pick.status?.description || 'Waiting'))}
                                </span>
                            </div>
                            ${pick.traded ? `<div class="flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span><span class="text-[10px] text-slate-500 font-bold uppercase tracking-tight">${pick.tradeNote}</span></div>` : ''}
                        </div>
                    `;
                }

                const tr = document.createElement('tr');
                tr.className = `group border-b border-slate-800/40 transition-all duration-300 ${isTrulyOnClock ? 'bg-blue-950/30' : 'hover:bg-slate-800/20'}`;
                
                tr.innerHTML = `
                    <td class="px-8 py-6 whitespace-nowrap">
                        <div class="text-2xl font-black text-slate-400 group-hover:text-blue-400 transition-colors tracking-tighter">#${pick.overall || pick.pick}</div>
                        <div class="text-[10px] text-slate-600 uppercase font-black tracking-widest">Pick ${pick.pick}</div>
                    </td>
                    <td class="px-8 py-6 whitespace-nowrap">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-xl bg-slate-800/80 border border-slate-700 p-2 flex items-center justify-center shadow-lg group-hover:border-slate-500 transition-colors">
                                ${team?.logo ? `<img src="${team.logo}" class="w-full h-full object-contain team-logo-shadow" />` : `<span class="text-xs font-black text-slate-600">${teamId}</span>`}
                            </div>
                            <div class="flex flex-col">
                                <span class="font-black text-sm text-white tracking-wide uppercase">${team?.name || 'Loading...'}</span>
                                <span class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.2em]">NFL Franchise</span>
                            </div>
                        </div>
                    </td>
                    <td class="px-8 py-6">
                        ${playerHtml}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateLiveIndicator() {
            const allPicks = currentData.items.flatMap(r => r.picks || []);
            const onClock = allPicks.find(p => p.status?.name === "ON_THE_CLOCK");
            const clockContainer = document.getElementById('clock-container');

            if (onClock) {
                const teamId = getId(onClock.team?.$ref);
                const team = cache.teams.get(teamId);
                
                document.getElementById('clock-team-name').innerText = team ? team.name : 'Loading...';
                const logoImg = document.getElementById('clock-team-logo');
                const idText = document.getElementById('clock-team-id');
                
                if (team?.logo) {
                    logoImg.src = team.logo;
                    logoImg.classList.remove('hidden');
                    idText.classList.add('hidden');
                } else {
                    idText.innerText = teamId;
                    idText.classList.remove('hidden');
                    logoImg.classList.add('hidden');
                }
                
                clockContainer.classList.remove('hidden');
            } else {
                clockContainer.classList.add('hidden');
            }
        }

        setInterval(fetchDraftData, REFRESH_INTERVAL);
        fetchDraftData();
    </script>
</body>
</html>
