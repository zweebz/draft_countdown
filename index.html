<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B/R LIVE | 2026 NFL Draft Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap');

        :root {
            --br-black: #0a0a0a;
            --br-grey: #1a1a1a;
            --br-light-grey: #333333;
            --br-white: #ffffff;
            --br-rainbow: linear-gradient(90deg, #FFB7B2, #FFDAC1, #E2F0CB, #B5EAD7, #C7CEEA, #FFB7B2, #FFDAC1);
        }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background-color: var(--br-black);
            color: var(--br-white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-transform: uppercase;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: var(--br-grey);
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            overflow: hidden;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: var(--br-rainbow);
            background-size: 300% auto;
            animation: shimmer 3s linear infinite;
            z-index: 10;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .header {
            background-color: var(--br-black);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--br-light-grey);
            flex-shrink: 0;
        }

        .br-logo {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 18px;
            background: var(--br-rainbow);
            background-size: 300% auto;
            animation: shimmer 3s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .api-status {
            font-size: 9px;
            color: #444;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .status-text { display: flex; align-items: center; gap: 5px; }
        .api-status.active .status-text { color: #B5EAD7; }
        .api-status.error .status-text { color: #FFB7B2; }
        .last-check { font-size: 8px; color: #666; text-transform: none; }

        .main-pick {
            padding: 30px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #222 0%, #0a0a0a 100%);
            flex-shrink: 0;
        }

        .pick-number {
            font-family: 'Oswald', sans-serif;
            font-size: 100px;
            line-height: 1;
            font-weight: 700;
            margin: 0;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            background-color: var(--br-black);
            padding: 15px 0;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }

        .stat-item { text-align: center; border-right: 1px solid #222; }
        .stat-item:last-child { border-right: none; }

        .stat-value {
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            background: var(--br-rainbow);
            background-size: 300% auto;
            animation: shimmer 3s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label { font-size: 9px; color: #666; letter-spacing: 1px; margin-top: 4px; }

        .latest-selection {
            background-color: #000;
            margin: 15px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            flex-shrink: 0;
        }

        .latest-selection::after {
            content: "LATEST SELECTION";
            position: absolute;
            top: -8px;
            left: 15px;
            background: var(--br-rainbow);
            background-size: 300% auto;
            animation: shimmer 3s linear infinite;
            color: #000;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .team-logo {
            width: 50px; height: 50px;
            background: #111; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            padding: 5px;
        }
        .team-logo img { width: 100%; height: auto; }

        .player-info { text-align: left; overflow: hidden; }
        .player-name { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; color: #fff; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-detail { font-size: 11px; color: #888; margin: 0; }

        .history-container {
            flex-grow: 1;
            overflow-y: auto;
            background: #050505;
            border-top: 1px solid #222;
        }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th {
            position: sticky; top: 0; background: #111;
            padding: 10px; text-align: left; color: #555;
            font-size: 10px; z-index: 5;
        }
        td { padding: 12px 10px; border-bottom: 1px solid #111; color: #ccc; }
        .td-pick { font-family: 'Oswald', sans-serif; color: #666; width: 40px; }
        .td-team { width: 40px; text-align: center; }
        .td-team img { width: 22px; height: auto; opacity: 0.8; }
        .td-player { font-weight: 700; color: #eee; }
        .td-school { color: #666; font-size: 10px; }

        .controls { padding: 20px; background-color: var(--br-grey); flex-shrink: 0; }

        .btn-next {
            background: var(--br-rainbow);
            background-size: 300% auto;
            animation: shimmer 3s linear infinite;
            color: #000;
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            font-weight: 700;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .nap-tracker {
            background: #000;
            padding: 15px 25px;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .nap-time { font-family: 'Oswald', sans-serif; font-size: 24px; color: #C7CEEA; }

        .nap-controls { display: flex; gap: 10px; }
        .nap-controls button {
            width: 36px; height: 36px; font-size: 16px;
            background: #1a1a1a; color: #fff;
            border: 1px solid #333; border-radius: 8px;
            cursor: pointer;
        }
        .nap-controls button.active {
            background: var(--br-rainbow);
            background-size: 300% auto;
            animation: shimmer 3s linear infinite;
            color: #000; border: none;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <div class="br-logo">B/R NFL DRAFT SHOW</div>
                <div id="apiIndicator" class="api-status">
                    <div class="status-text">ESPN API: CONNECTING...</div>
                    <div id="lastSyncTime" class="last-check">Authenticating...</div>
                </div>
            </div>
            <div class="live-tag">LIVE</div>
        </div>

        <div class="main-pick">
            <div style="font-size: 14px; letter-spacing: 3px; color: #888; margin-bottom: 5px;">ON THE CLOCK</div>
            <h1 class="pick-number" id="pickDisplay">204</h1>
        </div>

        <div class="stats-bar">
            <div class="stat-item"><div class="stat-value" id="countDisplay">53</div><div class="stat-label">Picks Left</div></div>
            <div class="stat-item"><div class="stat-value" id="timerDisplay">00:00:00</div><div class="stat-label">Est. Time</div></div>
            <div class="stat-item"><div class="stat-value">257</div><div class="stat-label">Final Pick</div></div>
        </div>

        <div class="latest-selection" id="latestCard">
            <div class="team-logo" id="latestLogo">
                <svg viewBox="0 0 24 24" fill="#333" width="30"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/></svg>
            </div>
            <div class="player-info">
                <p class="player-name" id="latestName">Waiting for sync...</p>
                <p class="player-detail" id="latestDetail">New picks will appear here</p>
            </div>
        </div>

        <div class="history-container">
            <table>
                <thead>
                    <tr>
                        <th class="td-pick">PK</th>
                        <th class="td-team">TM</th>
                        <th>PLAYER / SCHOOL</th>
                    </tr>
                </thead>
                <tbody id="draftBoardBody"></tbody>
            </table>
        </div>

        <div class="controls">
            <button class="btn-next" id="mainBtn" onclick="submitPick()">Submit Pick 204</button>
            <button style="background: transparent; color: #444; border: 1px solid #222; font-size: 11px; padding: 8px; cursor: pointer; width: 100%; border-radius: 4px;" onclick="resetTo204()">Hard Reset Tracker</button>
        </div>

        <div class="nap-tracker">
            <div>
                <div style="font-size: 9px; color: #555; font-weight: bold; letter-spacing: 1px;">RED'S NAP TIMER</div>
                <div class="nap-time" id="napDisplay">00:00:00</div>
            </div>
            <div class="nap-controls">
                <button id="napPlay" onclick="setNap(true)">▶</button>
                <button id="napPause" onclick="setNap(false)">⏸</button>
                <button onclick="resetNap()">↺</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore-compat.js"></script>

    <script>
        const config = {
            apiKey: "AIzaSyDecV3qGqmwD6T7B2TAHfb3FT5jegIWBLk",
            authDomain: "drafttracker-b6720.firebaseapp.com",
            projectId: "drafttracker-b6720",
            storageBucket: "drafttracker-b6720.firebasestorage.app",
            messagingSenderId: "745753068393",
            appId: "1:745753068393:web:5188024ae9abc9bd3573f8"
        };

        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const draftPath = `artifacts/${config.projectId}/public/data/draftState/current`;
        const napPath = `artifacts/${config.projectId}/public/data/napState/current`;

        let currentPick = 204;
        let napSeconds = 0;
        let napActive = false;
        let countdownSec = 0;
        let pickHistory = [];

        function format(s) {
            if (s <= 0) return "00:00:00";
            const h = Math.floor(s / 3600).toString().padStart(2, '0');
            const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
            const sec = (s % 60).toString().padStart(2, '0');
            return `${h}:${m}:${sec}`;
        }

        function updateUI() {
            document.getElementById('pickDisplay').innerText = currentPick;
            document.getElementById('countDisplay').innerText = Math.max(0, 257 - currentPick);
            document.getElementById('mainBtn').innerText = currentPick > 257 ? "DRAFT COMPLETE" : `Submit Pick ${currentPick}`;
            
            countdownSec = 0;
            for (let i = currentPick; i <= 257; i++) {
                countdownSec += (i >= 217) ? 139 : 174;
            }
            document.getElementById('timerDisplay').innerText = format(countdownSec);

            if (pickHistory.length > 0) {
                const latest = pickHistory[0];
                document.getElementById('latestName').innerText = latest.player || "Selected";
                document.getElementById('latestDetail').innerText = `${latest.pos || "POS"} | ${latest.school || "School"}`;
                if (latest.logo) {
                    document.getElementById('latestLogo').innerHTML = `<img src="${latest.logo}" alt="team">`;
                }
            }
            
            const tbody = document.getElementById('draftBoardBody');
            tbody.innerHTML = '';
            pickHistory.forEach(pick => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="td-pick">${pick.number}</td>
                    <td class="td-team">${pick.logo ? `<img src="${pick.logo}" alt="">` : '-'}</td>
                    <td>
                        <div class="td-player">${pick.player}</div>
                        <div class="td-school">${pick.pos} | ${pick.school}</div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        async function submitPick() {
            if (currentPick <= 257) {
                currentPick++;
                updateUI();
                if (!auth.currentUser) await auth.signInAnonymously();
                await db.doc(draftPath).set({ currentPick, lastUpdated: Date.now() }, { merge: true });
                fetchEspnDraft();
            }
        }

        // --- IMPROVED ESPN API FETCH ---
        async function fetchEspnDraft() {
            const apiIndicator = document.getElementById('apiIndicator');
            const statusText = apiIndicator.querySelector('.status-text');
            const syncTimeText = document.getElementById('lastSyncTime');

            try {
                // Using corsproxy.io for better reliability than allorigins
                const targetUrl = 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/draft/board';
                const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`);
                
                if (!response.ok) throw new Error('Proxy failed');
                const data = await response.json();
                
                const now = new Date().toLocaleTimeString();
                syncTimeText.innerText = `Last Sync: ${now}`;

                if (data && data.draft && data.draft.picks) {
                    const allPicks = data.draft.picks;
                    const madePicks = allPicks.filter(p => p.player);
                    
                    const newHistory = madePicks.map(p => ({
                        number: p.overall,
                        player: p.player.displayName,
                        pos: p.player.position,
                        school: p.player.school,
                        logo: p.team ? p.team.logo : null,
                        team: p.team ? p.team.displayName : 'TBD'
                    })).sort((a, b) => b.number - a.number);

                    const latestPickNumMade = newHistory.length > 0 ? newHistory[0].number : 0;
                    const latestPickOnClock = latestPickNumMade + 1;
                    
                    // Always update history locally
                    pickHistory = newHistory;

                    if (latestPickOnClock > currentPick) {
                        currentPick = latestPickOnClock;
                        if (!auth.currentUser) await auth.signInAnonymously();
                        await db.doc(draftPath).set({ 
                            currentPick, 
                            history: pickHistory.slice(0, 20), // Sync top 20 picks
                            lastUpdated: Date.now() 
                        }, { merge: true });
                    }
                    
                    statusText.innerText = "ESPN API: LIVE";
                    apiIndicator.className = 'api-status active';
                    updateUI();
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                statusText.innerText = "ESPN API: SYNC ERROR";
                syncTimeText.innerText = "Re-trying in 15s...";
                apiIndicator.className = 'api-status error';
            }
        }

        setInterval(fetchEspnDraft, 15000);
        fetchEspnDraft();

        async function resetTo204() {
            if (confirm("Reset to Pick 204?")) {
                currentPick = 204;
                pickHistory = [];
                updateUI();
                if (!auth.currentUser) await auth.signInAnonymously();
                await db.doc(draftPath).set({ currentPick: 204, history: [] }, { merge: true });
            }
        }

        function updateNapUI() {
            document.getElementById('napDisplay').innerText = format(napSeconds);
            document.getElementById('napPlay').className = napActive ? 'active' : '';
        }

        async function setNap(active) {
            napActive = active;
            updateNapUI();
            if (!auth.currentUser) await auth.signInAnonymously();
            await db.doc(napPath).set({ napActive, napSeconds }, { merge: true });
        }

        async function resetNap() {
            napSeconds = 0; napActive = false;
            updateNapUI();
            if (!auth.currentUser) await auth.signInAnonymously();
            await db.doc(napPath).set({ napActive, napSeconds }, { merge: true });
        }

        setInterval(() => {
            if (countdownSec > 0) {
                countdownSec--;
                document.getElementById('timerDisplay').innerText = format(countdownSec);
            }
            if (napActive) {
                napSeconds++;
                updateNapUI();
            }
        }, 1000);

        async function startSync() {
            if (!auth.currentUser) await auth.signInAnonymously();
            
            db.doc(draftPath).onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.currentPick && data.currentPick > currentPick) {
                        currentPick = data.currentPick;
                    }
                    if (data.history && data.history.length > 0) {
                        // Merge logic: prioritize the latest info
                        const merged = [...data.history, ...pickHistory];
                        const unique = Array.from(new Set(merged.map(a => a.number)))
                            .map(num => merged.find(a => a.number === num))
                            .sort((a, b) => b.number - a.number);
                        pickHistory = unique;
                    }
                    updateUI();
                }
            }, err => console.error("Firebase Sync Error:", err));

            db.doc(napPath).onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.napSeconds > napSeconds) napSeconds = data.napSeconds;
                    napActive = data.napActive;
                    updateNapUI();
                }
            });
        }

        updateUI();
        startSync();
    </script>
</body>
</html>
